name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Publish Mod
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Project IDs
          modrinth-id: fXXYl7Tv
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1550548
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Technical metadata
          loaders: neoforge
          game-versions: 1.21.1
          java: Java 21

          # Files to upload (skips dev, sources, and javadoc jars)
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          dependencies: |
            sodium(required){modrinth:AANobbMI}{curseforge:394468}